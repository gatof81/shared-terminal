# ── Shared Terminal — tmux defaults for session containers ───────────────────

# Use 256 colours + true-color (24-bit RGB) passthrough
set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Increase scrollback
set -g history-limit 50000

# Start windows and panes at 1
set -g base-index 1
setw -g pane-base-index 1

# Faster escape (for vim users)
set -sg escape-time 10

# Forward focus-in/out events to the inner terminal (vim :FocusGained/:FocusLost)
set -g focus-events on

# Extended key sequences — lets tmux pass Ctrl+Arrow, Shift+F1, etc. through
# to apps that use them (neovim, fzf, …)
set -g extended-keys on

# DEBUG: temporarily ON so we can read pane_in_mode / scroll_position /
# mouse_any_flag / alternate_on live while diagnosing why wheel-up doesn't
# auto-enter copy-mode + scroll for the user. status-interval 1 makes
# the values refresh every second so they're visible in real time. To
# revert, restore `set -g status off` and drop the status-right /
# status-interval / status-left lines.
set -g status on
set -g status-interval 1
set -g status-style 'bg=#1e1e2e fg=#cdd6f4'
set -g status-left ''
set -g status-left-length 0
set -g status-right 'mode=#{pane_in_mode} scroll=#{scroll_position} mouse_any=#{mouse_any_flag} alt=#{alternate_on}'
set -g status-right-length 80

# Enable mouse so TUI apps (vim, htop, …) can receive click/drag events.
set -g mouse on

# Disable tmux's right-click popup menus. In a browser-hosted terminal the
# menus flicker and dismiss on any pointer movement (xterm reports every
# mouse-move to tmux, and touch positions jump), so they're unusable. The
# frontend drops its preventDefault on `contextmenu` in tandem, which lets
# the browser's own Copy/Paste menu show up instead — behaviour users
# actually expect in a web page.
unbind -n MouseDown3Pane
unbind -n MouseDown3Status
unbind -n MouseDown3StatusLeft
unbind -n MouseDown3StatusRight
unbind -n M-MouseDown3Pane

# Rebind wheel scroll. The frontend (terminal.ts) deliberately does not
# attach a custom wheel handler — xterm's default forwards every wheel
# event as SGR mouse-tracking and these bindings decide what to do.
# Branches:
#
#   #{pane_in_mode}    — already in copy-mode, keep scrolling: send-keys -M
#                        forwards the wheel as mouse-tracking which tmux
#                        interprets as scroll-up/down inside the mode.
#   #{mouse_any_flag}  — app requested xterm mouse (vim, htop, claude with
#                        explicit mouse, …) — forward via send-keys -M so the
#                        app handles wheel itself.
#   else (main buffer with no mouse-app, OR alt buffer with no mouse-app
#                        — claude TUI / Ink, less, man, git diff, plain
#                        bash, …): WheelUpPane enters copy-mode -e and
#                        explicitly issues `send-keys -X -N 3 scroll-up`.
#                        We can't use `send-keys -M` here (forward the
#                        original wheel event) because the event doesn't
#                        carry into the just-entered mode — the first
#                        wheel would silently enter copy-mode with no
#                        visible scroll, and we have no status bar to
#                        surface the mode change. The explicit scroll
#                        gives the first wheel an immediately-visible
#                        chunk; subsequent wheels match `pane_in_mode`
#                        and use `send-keys -M` which works fine once
#                        the mode is already active. `-e` makes
#                        copy-mode auto-exit when the user scrolls back
#                        to the bottom, so the mode feels transient.
#                        WheelDownPane in this branch is a no-op `""`:
#                        outside copy-mode there's nothing below the
#                        live pane to scroll into.
#
# This is the only way to reach pane history in this stack, because
# tmux manages the pane in-place — content never flows off the top
# of xterm's buffer, so xterm's local scrollback stays empty
# regardless of how much output has rendered. tmux's
# `history-limit 50000` is the only history available; copy-mode is
# the only way to navigate it.
#
# Trade-off: less/man lose their native wheel-scroll-the-app behaviour
# and now scroll tmux's pane history instead. Their built-in keys (j/k,
# Ctrl-D/Ctrl-U, space/b) still work for in-app navigation.
bind -n WheelUpPane \
  if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" \
    "send-keys -M" \
    "copy-mode -e ; send-keys -X -N 3 scroll-up"
bind -n WheelDownPane \
  if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" \
    "send-keys -M" \
    ""

# Pane borders
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"

# Automatically rename windows
setw -g automatic-rename on
set -g renumber-windows on

# Activity monitoring
setw -g monitor-activity on
set -g visual-activity off
