# ── Shared Terminal — tmux defaults for session containers ───────────────────

# Use 256 colours + true-color (24-bit RGB) passthrough
set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Increase scrollback
set -g history-limit 50000

# Start windows and panes at 1
set -g base-index 1
setw -g pane-base-index 1

# Faster escape (for vim users)
set -sg escape-time 10

# Forward focus-in/out events to the inner terminal (vim :FocusGained/:FocusLost)
set -g focus-events on

# Extended key sequences — lets tmux pass Ctrl+Arrow, Shift+F1, etc. through
# to apps that use them (neovim, fzf, …)
set -g extended-keys on

# Hide the tmux status bar. The frontend renders its own tab strip, so the
# status bar just steals a terminal row — applications inside tmux believe they
# have (cols × (rows-1)) cells and everything reflows one row too short. With
# status off, the full xterm viewport is available to the running program.
set -g status off

# Enable mouse so TUI apps (vim, htop, …) can receive click/drag events.
set -g mouse on

# Disable tmux's right-click popup menus. In a browser-hosted terminal the
# menus flicker and dismiss on any pointer movement (xterm reports every
# mouse-move to tmux, and touch positions jump), so they're unusable. The
# frontend drops its preventDefault on `contextmenu` in tandem, which lets
# the browser's own Copy/Paste menu show up instead — behaviour users
# actually expect in a web page.
unbind -n MouseDown3Pane
unbind -n MouseDown3Status
unbind -n MouseDown3StatusLeft
unbind -n MouseDown3StatusRight
unbind -n M-MouseDown3Pane

# Rebind wheel scroll. The frontend (terminal.ts) deliberately does not
# attach a custom wheel handler — xterm's default forwards every wheel
# event as SGR mouse-tracking and these bindings decide what to do.
# Branches:
#
#   #{pane_in_mode}    — already in copy-mode, keep scrolling: send-keys -M
#                        forwards the wheel as mouse-tracking which tmux
#                        interprets as scroll-up/down inside the mode.
#   #{mouse_any_flag}  — app requested xterm mouse (vim, htop, claude with
#                        explicit mouse, …) — forward via send-keys -M so the
#                        app handles wheel itself.
#   else (main buffer with no mouse-app, OR alt buffer with no mouse-app
#                        — claude TUI / Ink, less, man, git diff, plain
#                        bash, …): enter copy-mode and forward the same
#                        wheel event so tmux interprets it as a scroll.
#                        `-e` makes copy-mode auto-exit when the user
#                        scrolls back to the bottom, so the mode feels
#                        transient. This is the only way to reach pane
#                        history in this stack, because tmux manages the
#                        pane in-place — content never flows off the top
#                        of xterm's buffer, so xterm's local scrollback
#                        stays empty regardless of how much output has
#                        rendered. tmux's `history-limit 50000` is the
#                        only history available; copy-mode is the only
#                        way to navigate it.
#
# Trade-off: less/man lose their native wheel-scroll-the-app behaviour
# and now scroll tmux's pane history instead. Their built-in keys (j/k,
# Ctrl-D/Ctrl-U, space/b) still work for in-app navigation.
# Note on the else branch: `copy-mode -e ; send-keys -M` looked right but
# in practice the first wheel just silently enters copy-mode without
# scrolling — the original mouse event doesn't carry over into the
# just-entered mode. Use the explicit `send-keys -X -N 3 scroll-up`
# form so the first wheel both enters copy-mode AND scrolls a chunk
# the user can see. Subsequent wheel events take the `pane_in_mode`
# branch above and use `send-keys -M`, which works once the mode is
# already active.
bind -n WheelUpPane \
  if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" \
    "send-keys -M" \
    "copy-mode -e ; send-keys -X -N 3 scroll-up"
bind -n WheelDownPane \
  if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" \
    "send-keys -M" \
    ""

# Pane borders
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"

# Automatically rename windows
setw -g automatic-rename on
set -g renumber-windows on

# Activity monitoring
setw -g monitor-activity on
set -g visual-activity off
