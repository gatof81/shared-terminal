<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' ws://localhost:3001 wss://localhost:3001 http://localhost:3001;"
    />
    <title>Shared Terminal</title>
  </head>
  <body>
    <!-- Auth view -->
    <div id="auth-view">
      <div class="auth-card">
        <h2 id="auth-title">Login</h2>
        <form id="auth-form">
          <input
            id="auth-username"
            type="text"
            placeholder="Username"
            autocomplete="username"
          />
          <input
            id="auth-password"
            type="password"
            placeholder="Password"
            autocomplete="current-password"
          />
          <input
            id="auth-invite-code"
            class="hidden"
            type="text"
            placeholder="Invite code"
            autocomplete="off"
            spellcheck="false"
          />
          <div id="auth-error"></div>
          <button type="submit" id="auth-submit">Login</button>
        </form>
        <p id="auth-toggle">
          No account? <a href="#" id="auth-toggle-link">Register</a>
        </p>
      </div>
    </div>

    <!-- App view -->
    <div id="app-view">
      <header>
        <button
          id="sidebar-toggle"
          type="button"
          aria-label="Toggle sessions sidebar"
          aria-expanded="false"
          aria-controls="sidebar"
        >
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
          </svg>
        </button>
        <h1 id="app-title">⬛ Shared Terminal</h1>
        <button
          id="chrome-toggle"
          type="button"
          aria-label="Toggle session controls"
          aria-expanded="false"
          aria-controls="terminal-toolbar"
          hidden
        >
          <span id="chrome-toggle-label">Session</span>
          <svg
            id="chrome-toggle-icon"
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.4"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <polyline points="6 9 12 15 18 9"></polyline>
          </svg>
        </button>
        <div class="header-right">
          <span id="user-display"></span>
          <button id="invites-btn" title="Manage invite codes">Invites</button>
          <button id="logout-btn">Logout</button>
        </div>
      </header>
      <main>
        <div id="sidebar-backdrop" aria-hidden="true"></div>
        <aside id="sidebar">
          <div id="sidebar-header">
            <h2>Sessions</h2>
            <label
              id="show-terminated-label"
              title="Include terminated sessions so you can restore them"
            >
              <input type="checkbox" id="show-terminated-toggle" />
              Show terminated
            </label>
          </div>
          <form id="new-session-form">
            <input
              id="new-session-input"
              type="text"
              placeholder="New session name…"
              maxlength="64"
              autocomplete="off"
            />
            <button type="submit">+ New</button>
          </form>
          <div id="session-list"></div>
          <div id="sidebar-footer">
            <span id="sidebar-user-display" aria-hidden="true">●</span>
            <button id="sidebar-invites-btn" type="button">Invites</button>
            <button id="sidebar-logout-btn" type="button">Logout</button>
          </div>
        </aside>
        <section id="terminal-area">
          <div id="empty-state">Select or create a session →</div>
          <div id="terminal-toolbar">
            <span>Session:</span>
            <span id="terminal-session-name"></span>
            <span id="terminal-status-badge"></span>
            <button
              id="font-size-btn"
              type="button"
              title="Cycle terminal font size"
              aria-label="Change terminal font size"
            >
              Aa
            </button>
          </div>
          <div id="terminal-tabs"></div>
          <div id="terminal-container"></div>
        </section>
      </main>
    </div>

    <div id="toast"></div>

    <!-- Invites modal -->
    <div id="invites-modal" class="modal" aria-hidden="true">
      <div class="modal-backdrop" data-close-modal></div>
      <div
        class="modal-card"
        role="dialog"
        aria-modal="true"
        aria-labelledby="invites-modal-title"
      >
        <div class="modal-header">
          <h2 id="invites-modal-title">Invite codes</h2>
          <button
            class="modal-close"
            type="button"
            aria-label="Close"
            data-close-modal
          >
            ×
          </button>
        </div>
        <p class="modal-hint">
          Share an invite code with someone to let them register an account.
          Each code can only be used once.
        </p>
        <button id="invite-create-btn" type="button">
          + Generate new invite
        </button>
        <div id="invite-list" class="invite-list"></div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
