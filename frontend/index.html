<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shared Terminal</title>
    <style>
      /* ── Reset & base ─────────────────────────────────────────────────── */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: system-ui, sans-serif;
        background: #0d1117;
        color: #e6edf3;
        height: 100dvh;
        display: flex;
        flex-direction: column;
      }

      /* ── Header ───────────────────────────────────────────────────────── */
      header {
        display: flex;
        align-items: center;
        gap: 1rem;
        padding: 0.75rem 1.25rem;
        background: #161b22;
        border-bottom: 1px solid #30363d;
        flex-shrink: 0;
      }
      header h1 {
        font-size: 1rem;
        font-weight: 600;
        color: #58a6ff;
      }
      #user-badge {
        margin-left: auto;
        font-size: 0.75rem;
        color: #8b949e;
      }
      #user-badge span {
        color: #e6edf3;
        font-weight: 500;
      }

      /* ── Layout ───────────────────────────────────────────────────────── */
      main {
        flex: 1;
        display: grid;
        grid-template-columns: 260px 1fr;
        overflow: hidden;
      }

      /* ── Sidebar ──────────────────────────────────────────────────────── */
      #sidebar {
        background: #161b22;
        border-right: 1px solid #30363d;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      #sidebar-header {
        padding: 0.75rem 1rem;
        border-bottom: 1px solid #30363d;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      #sidebar-header h2 {
        font-size: 0.75rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: #8b949e;
      }

      /* New-session form */
      #new-session-form {
        padding: 0.75rem 1rem;
        border-bottom: 1px solid #30363d;
        display: flex;
        gap: 0.5rem;
      }
      #new-session-form input {
        flex: 1;
        background: #0d1117;
        border: 1px solid #30363d;
        border-radius: 6px;
        padding: 0.35rem 0.6rem;
        font-size: 0.8rem;
        color: #e6edf3;
        outline: none;
      }
      #new-session-form input:focus {
        border-color: #58a6ff;
      }
      #new-session-form button {
        background: #238636;
        border: none;
        border-radius: 6px;
        padding: 0.35rem 0.65rem;
        color: #fff;
        font-size: 0.8rem;
        cursor: pointer;
        white-space: nowrap;
      }
      #new-session-form button:hover {
        background: #2ea043;
      }

      /* Session list */
      #session-list {
        flex: 1;
        overflow-y: auto;
        padding: 0.5rem;
      }
      .session-item {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.5rem 0.6rem;
        border-radius: 6px;
        cursor: pointer;
        margin-bottom: 2px;
        transition: background 0.1s;
      }
      .session-item:hover {
        background: #21262d;
      }
      .session-item.active {
        background: #1f3348;
      }
      .session-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        flex-shrink: 0;
      }
      .session-dot.running {
        background: #3fb950;
      }
      .session-dot.disconnected {
        background: #e3b341;
      }
      .session-dot.terminated {
        background: #f85149;
      }
      .session-name {
        flex: 1;
        font-size: 0.82rem;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .session-kill {
        opacity: 0;
        background: transparent;
        border: none;
        color: #f85149;
        font-size: 0.75rem;
        cursor: pointer;
        padding: 2px 4px;
        border-radius: 4px;
      }
      .session-item:hover .session-kill {
        opacity: 1;
      }
      .session-kill:hover {
        background: rgba(248, 81, 73, 0.15);
      }

      /* ── Terminal area ────────────────────────────────────────────────── */
      #terminal-area {
        display: flex;
        flex-direction: column;
        overflow: hidden;
        position: relative;
      }
      #terminal-toolbar {
        padding: 0.5rem 1rem;
        background: #161b22;
        border-bottom: 1px solid #30363d;
        font-size: 0.78rem;
        color: #8b949e;
        display: flex;
        align-items: center;
        gap: 0.75rem;
        flex-shrink: 0;
      }
      #terminal-session-name {
        color: #e6edf3;
        font-weight: 500;
      }
      #terminal-status-badge {
        padding: 1px 8px;
        border-radius: 10px;
        font-size: 0.7rem;
        font-weight: 600;
        text-transform: uppercase;
      }
      #terminal-status-badge.running {
        background: rgba(63, 185, 80, 0.2);
        color: #3fb950;
      }
      #terminal-status-badge.disconnected {
        background: rgba(227, 179, 65, 0.2);
        color: #e3b341;
      }
      #terminal-status-badge.terminated {
        background: rgba(248, 81, 73, 0.2);
        color: #f85149;
      }

      #terminal-container {
        flex: 1;
        overflow: hidden;
        padding: 4px;
        background: #0d1117;
      }
      /* xterm.js internal canvas fills the container */
      #terminal-container .xterm {
        height: 100%;
      }

      #empty-state {
        display: flex;
        align-items: center;
        justify-content: center;
        flex: 1;
        color: #8b949e;
        font-size: 0.9rem;
      }

      /* ── Toast notifications ──────────────────────────────────────────── */
      #toast {
        position: fixed;
        bottom: 1.5rem;
        right: 1.5rem;
        background: #21262d;
        border: 1px solid #30363d;
        border-radius: 8px;
        padding: 0.6rem 1rem;
        font-size: 0.82rem;
        max-width: 320px;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s;
      }
      #toast.visible {
        opacity: 1;
      }
      #toast.error {
        border-color: #f85149;
        color: #f85149;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>⬛ Shared Terminal</h1>
      <div id="user-badge">Logged in as <span id="user-id-display"></span></div>
    </header>

    <main>
      <aside id="sidebar">
        <div id="sidebar-header">
          <h2>Sessions</h2>
        </div>
        <form id="new-session-form">
          <input
            id="new-session-input"
            type="text"
            placeholder="New session name…"
            maxlength="64"
            autocomplete="off"
          />
          <button type="submit">+ New</button>
        </form>
        <div id="session-list"></div>
      </aside>

      <section id="terminal-area">
        <div id="empty-state">Select or create a session →</div>
        <div id="terminal-toolbar" style="display: none">
          <span>Session:</span>
          <span id="terminal-session-name"></span>
          <span id="terminal-status-badge"></span>
        </div>
        <div id="terminal-container" style="display: none"></div>
      </section>
    </main>

    <div id="toast"></div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
